<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


</head>
<body>
    
    <h1 class="display-1 text-white bg-dark text-center py-3"></h1>

    <div class="container">
        <div class="row">

            <div class="col text-center">

                <h2>Lista de Alunos</h2>

                <button class="btn btn-primary mt-4" data-bs-toggle="modal" data-bs-target="#exemploModal">
                    Ver Notas
                </button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="exemploModal">
        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">
                    <h3 class="modal-title">Notas dos Alunos</h3>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form>

                        <div class="container">
                            <div class="row">
                        
                                    <div class="col">

                                        <table class="table table-striped">

                                            <thead class="table-dark">

                                                <tr>
                                                    <th>#</th>
                                                    <th>Aluno</th>
                                                    <th>Front-End</th>
                                                    <th>Back-End</th>
                                                    <th>Média</th>
                                                </tr>

                                            </thead>

                                            <tbody>
                                                <tr>
                                                    <td>1</td>
                                                    <td>Letícia</td>
                                                    <td>6.0</td>
                                                    <td>7.0</td>
                                                    <td>6.5</td>
                                                </tr>
                                                <tr>
                                                    <td>2</td>
                                                    <td>Eduarda</td>
                                                    <td>9.5</td>
                                                    <td>8.5</td>
                                                    <td>9.0</td>
                                                </tr>
                                                <tr>
                                                    <td>3</td>
                                                    <td>Matheus</td>
                                                    <td>5.0</td>
                                                    <td>6.0</td>
                                                    <td>5.5</td>
                                                </tr>
                                            </tbody>

                                        </table>

                                    </div>

                            </div>
                        </div>
                        
                    </form>
                </div>

                 <div class="modal-footer d-fley justify-content-end">
                    <button class="btn btn-success" data-bs-dismiss="modal">Enviar</button>
                 </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
